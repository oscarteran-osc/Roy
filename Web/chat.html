<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ROY – Chat</title>
  <link rel="stylesheet" href="styles.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    .chat-container {
      max-width: 700px;
      margin: 32px auto;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.10);
      display: flex;
      flex-direction: column;
      height: 70vh;
      overflow: hidden;
    }
    .chat-header {
      background: #134299;
      color: #fff;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-radius: 16px 16px 0 0;
    }
    .chat-header a { color: #fff; text-decoration: none; font-size: 20px; }
    .chat-header h2 { margin: 0; font-size: 18px; font-family: 'Poppins', sans-serif; }
    .chat-mensajes {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: #f5f5f5;
    }
    .burbuja {
      max-width: 65%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      font-family: 'Poppins', sans-serif;
      line-height: 1.4;
      word-break: break-word;
    }
    .burbuja.mia {
      background: #134299;
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }
    .burbuja.otro {
      background: #e0e0e0;
      color: #222;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }
    .burbuja .hora {
      font-size: 10px;
      opacity: 0.7;
      margin-top: 4px;
      text-align: right;
    }
    .chat-input {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      background: #fff;
      border-top: 1px solid #eee;
    }
    .chat-input input {
      flex: 1;
      border: 1px solid #ddd;
      border-radius: 20px;
      padding: 10px 16px;
      font-family: 'Poppins', sans-serif;
      font-size: 14px;
      outline: none;
    }
    .chat-input button {
      background: #134299;
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 42px;
      height: 42px;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .chat-input button:hover { background: #0d2e6b; }
    .sin-mensajes {
      text-align: center;
      color: #aaa;
      margin: auto;
      font-family: 'Poppins', sans-serif;
    }
  </style>
</head>
<body class="dashboard-page">

  <nav class="navbar-dashboard">
    <a href="dashboard.html" class="logo-dash">
      <img src="img/roy_blanco.png" alt="ROY" class="logo-img-dash"/>
    </a>
    <div class="dash-nav-links">
      <a href="dashboard.html"   class="dash-nav-link">Inicio</a>
      <a href="mis-objetos.html" class="dash-nav-link">Mis Objetos</a>
      <a href="solicitudes.html" class="dash-nav-link active">Solicitudes</a>
      <a href="mi-cuenta.html"   class="dash-nav-link">Mi Cuenta</a>
    </div>
    <div id="nav-search-wrapper">
      <input type="text" id="searchInput" class="nav-search-input" placeholder="¿Qué necesitas rentar hoy?"/>
    </div>
  </nav>

  <div class="dash-cat-bar">
    <button class="cat-nav-btn active" data-cat="todas">Todo</button>
    <button class="cat-nav-btn" data-cat="Eventos">Eventos</button>
    <button class="cat-nav-btn" data-cat="Tecnología">Tecnología</button>
    <button class="cat-nav-btn" data-cat="Herramientas">Herramientas</button>
    <button class="cat-nav-btn" data-cat="Deporte">Deporte</button>
  </div>

  <div class="chat-container">
    <div class="chat-header">
      <a href="solicitudes.html">←</a>
      <h2 id="chat-titulo">Chat</h2>
    </div>
    <div class="chat-mensajes" id="chat-mensajes">
      <p class="sin-mensajes">Cargando mensajes...</p>
    </div>
    <div class="chat-input">
      <input type="text" id="inputMensaje" placeholder="Escribe un mensaje..." maxlength="500"/>
      <button onclick="enviarMensaje()">➤</button>
    </div>
  </div>

  <script src="api.js"></script>
  <script src="chat.js"></script>
  <script src="chatbot.js"></script>
</body>
</html>
